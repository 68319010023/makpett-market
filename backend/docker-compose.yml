version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: menu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: menu_user
      POSTGRES_PASSWORD: menu_pass
      POSTGRES_DB: menu_db
    ports:
    - "5433:5432"
    volumes:
      - menu_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu_user -d menu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  menu_db_data: