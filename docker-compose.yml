version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: menu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: menu_user
      POSTGRES_PASSWORD: menu_pass
      POSTGRES_DB: menu_db
    ports:
      - "5433:5432"
    volumes:
      - menu_db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu_user -d menu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: menu_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: menu_user
      DB_PASSWORD: menu_pass
      DB_NAME: menu_db
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: menu_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  menu_db_data: